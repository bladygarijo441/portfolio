<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .gallery-item-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
            color: white;
            padding: 15px;
            font-size: 0.9em;
            word-break: break-word;
        }

        .empty-message {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 60px 20px;
            grid-column: 1 / -1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
                margin-bottom: 30px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .gallery-item img {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Portfolio Gallery</h1>
        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const imageFolder = 'images/';
        const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg'];

        async function loadImages() {
            const gallery = document.getElementById('gallery');

            try {
                const response = await fetch(imageFolder);
                
                if (!response.ok) {
                    gallery.innerHTML = '<div class="empty-message">📁 Add images to the "images" folder to display them here.</div>';
                    return;
                }

                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'));
                
                const imageFiles = links
                    .map(link => link.getAttribute('href'))
                    .filter(href => href && imageExtensions.some(ext => href.toLowerCase().endsWith(ext)))
                    .filter(href => !href.startsWith('/') && href !== '../');

                if (imageFiles.length === 0) {
                    gallery.innerHTML = '<div class="empty-message">📁 Add images to the "images" folder to display them here.</div>';
                    return;
                }

                gallery.innerHTML = imageFiles.map(file => `
                    <div class="gallery-item">
                        <img src="${imageFolder}${file}" alt="${file}" loading="lazy">
                        <div class="gallery-item-name">${file}</div>
                    </div>
                `).join('');

            } catch (error) {
                gallery.innerHTML = '<div class="empty-message">📁 Add images to the "images" folder to display them here.</div>';
            }
        }

        loadImages();
    </script>
</body>
</html>
